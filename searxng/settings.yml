# see https://docs.searxng.org/admin/settings/settings.html#settings-use-default-settings
# searxng/settings.yml
use_default_settings: true

server:
  secret_key: "xK9mP2$vL7@nQ4&wR8!jT5^"  # أي نص عشوائي
  limiter: false  # مهم جداً — عطّل الـ rate limiter
  image_proxy: true

ui:
  static_use_hash: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json  # مهم جداً — لازم يكون موجود

engines:
  - name: google
    engine: google
    shortcut: g
    
  - name: bing
    engine: bing
    shortcut: b
    
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
